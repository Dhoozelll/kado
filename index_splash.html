<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zell's</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dark: #010113;
      --green: #01af49;
      --green-dim: rgba(1, 175, 73, 0.15);
      --green-glow: rgba(1, 175, 73, 0.4);
    }
    body {
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Raleway', sans-serif;
    }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--green);
      border-radius: 50%;
      filter: blur(1px);
      animation: float-up var(--dur) linear infinite var(--delay);
      opacity: 0;
    }
    @keyframes float-up {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
    }
    .wrapper {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 2rem;
      animation: fade-in 1.5s ease forwards;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 1px solid var(--green-glow);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      margin-bottom: 2.5rem;
      animation: ring-pulse 3s ease-in-out infinite;
    }
    .icon-ring::before {
      content: ''; position: absolute; inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--green-dim);
      animation: ring-pulse 3s ease-in-out infinite 0.5s;
    }
    .icon-ring::after {
      content: ''; position: absolute; inset: -18px;
      border-radius: 50%;
      border: 1px solid rgba(1, 175, 73, 0.06);
      animation: ring-pulse 3s ease-in-out infinite 1s;
    }
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 10px var(--green-dim); }
      50% { box-shadow: 0 0 30px var(--green-glow); }
    }
    .icon-ring i {
      font-size: 2.8rem; color: var(--green);
      filter: drop-shadow(0 0 12px var(--green-glow));
      animation: icon-glow 3s ease-in-out infinite;
    }
    @keyframes icon-glow {
      0%, 100% { filter: drop-shadow(0 0 8px var(--green-dim)); }
      50% { filter: drop-shadow(0 0 20px var(--green)); }
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.2rem; font-weight: 300;
      color: #fff;
      letter-spacing: 0.15em; line-height: 1;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 40px rgba(1, 175, 73, 0.3);
    }
    .subtitle {
      font-size: 0.7rem; font-weight: 200;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      margin-bottom: 4rem;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.75rem;
      padding: 0.85rem 2.2rem;
      border: 1px solid var(--green);
      border-radius: 100px;
      background: transparent;
      color: var(--green);
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem; font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color 0.4s ease, box-shadow 0.4s ease;
      box-shadow: 0 0 15px var(--green-dim);
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--green);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.4s ease;
      z-index: -1;
    }
    .btn:hover::before, .btn:active::before { transform: scaleX(1); }
    .btn:hover, .btn:active { color: var(--dark); box-shadow: 0 0 30px var(--green-glow); }
    .btn i { font-size: 0.85rem; transition: transform 0.3s ease; }
    .btn:hover i { transform: translateX(4px); }
    .glow-bottom {
      position: fixed; bottom: -60px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 120px;
      background: radial-gradient(ellipse, var(--green-glow) 0%, transparent 70%);
      pointer-events: none; z-index: 1;
      animation: glow-breathe 4s ease-in-out infinite;
    }
    @keyframes glow-breathe {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="particles" id="particles"></div>
  <div class="glow-bottom"></div>
  <div class="wrapper">
    <div class="icon-ring">
      <i class="fa-solid fa-gift"></i>
    </div>
    <div class="title">Zell's</div>
    <div class="subtitle">something for you</div>
    <a class="btn" href="bunga.html">
      <i class="fa-solid fa-arrow-right"></i>
      Open Gift
    </a>
  </div>
  <script>
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*4}s;width:${Math.random()>0.8?3:2}px;height:${Math.random()>0.8?3:2}px;`;
      starsEl.appendChild(s);
    }
    const particlesEl = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;--dur:${6+Math.random()*8}s;--delay:${Math.random()*8}s;--drift:${(Math.random()-0.5)*80}px;`;
      particlesEl.appendChild(p);
    }
  </script>
</body>
</html>
